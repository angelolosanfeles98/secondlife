<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #08111f, #16243a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 560px;
      padding: 35px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 25px 70px rgba(0,0,0,0.45);
      text-align: center;
    }

    .ip {
      margin: 25px 0;
      font-size: 36px;
      font-weight: bold;
      color: #38bdf8;
      word-break: break-all;
    }

    .info {
      text-align: left;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 14px;
      line-height: 1.8;
    }

    .ok {
      margin-top: 20px;
      color: #86efac;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Verificação de Acesso</h1>

    <div id="ip" class="ip">Carregando IP...</div>

    <div class="info">
      <div><strong>Nome:</strong> <span id="nome">-</span></div>
      <div><strong>UUID:</strong> <span id="avatar">-</span></div>
      <div><strong>Cidade:</strong> <span id="cidade">-</span></div>
      <div><strong>País:</strong> <span id="pais">-</span></div>
      <div><strong>Provedor:</strong> <span id="provedor">-</span></div>
      <div><strong>Navegador:</strong> <span id="navegador">-</span></div>
    </div>

    <div id="status" class="ok"></div>
  </main>

  <script>
    function param(nome) {
      return new URLSearchParams(window.location.search).get(nome) || "";
    }

    async function carregar() {
      const avatar = param("avatar");
      const nome = param("nome");
      const primurl = param("primurl");

      document.getElementById("avatar").textContent = avatar || "-";
      document.getElementById("nome").textContent = nome || "-";
      document.getElementById("navegador").textContent = navigator.userAgent;

      let ip = "";
      let cidade = "";
      let pais = "";
      let provedor = "";

      try {
        const res = await fetch("https://ipwho.is/");
        const data = await res.json();

        ip = data.ip || "";
        cidade = data.city || "";
        pais = data.country || "";
        provedor = data.connection?.isp || "";

        document.getElementById("ip").textContent = ip || "IP não encontrado";
        document.getElementById("cidade").textContent = cidade || "-";
        document.getElementById("pais").textContent = pais || "-";
        document.getElementById("provedor").textContent = provedor || "-";
      } catch {
        const res2 = await fetch("https://api.ipify.org?format=json");
        const data2 = await res2.json();

        ip = data2.ip || "";
        document.getElementById("ip").textContent = ip || "IP não encontrado";
      }

      if (primurl && ip) {
        const retorno =
          primurl
          + "?acao=retorno"
          + "&avatar=" + encodeURIComponent(avatar)
          + "&nome=" + encodeURIComponent(nome)
          + "&ip=" + encodeURIComponent(ip)
          + "&cidade=" + encodeURIComponent(cidade)
          + "&pais=" + encodeURIComponent(pais);

        fetch(retorno, {
          method: "GET",
          mode: "no-cors"
        });

        document.getElementById("status").textContent =
          "Verificação enviada para o prim.";
      } else {
        document.getElementById("status").textContent =
          "Não foi possível enviar retorno ao prim.";
      }
    }

    carregar();
  </script>
</body>
</html>
