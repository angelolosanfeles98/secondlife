<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificação</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0a0f1f, #1c2a44);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 35px;
      border-radius: 20px;
      width: 90%;
      max-width: 550px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
    }

    .ip {
      font-size: 36px;
      color: #38bdf8;
      text-align: center;
      margin: 20px 0;
    }

    .info {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 12px;
      line-height: 1.8;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Verificação de Acesso</h1>

    <div class="ip" id="ip">Carregando IP...</div>

    <div class="info">
      <div><strong>Nome:</strong> <span id="nome">-</span></div>
      <div><strong>UUID:</strong> <span id="avatar">-</span></div>
      <div><strong>Cidade:</strong> <span id="cidade">-</span></div>
      <div><strong>País:</strong> <span id="pais">-</span></div>
      <div><strong>Provedor:</strong> <span id="provedor">-</span></div>
      <div><strong>Navegador:</strong> <span id="navegador">-</span></div>
    </div>

    <button onclick="copiarIP()">Copiar IP</button>
  </div>

  <script>
    let ipAtual = "";

    function getParam(nome) {
      return new URLSearchParams(window.location.search).get(nome) || "-";
    }

    async function carregar() {
      document.getElementById("nome").textContent = getParam("nome");
      document.getElementById("avatar").textContent = getParam("avatar");

      try {
        const res = await fetch("https://ipwho.is/");
        const data = await res.json();

        ipAtual = data.ip;

        document.getElementById("ip").textContent = data.ip;
        document.getElementById("cidade").textContent = data.city;
        document.getElementById("pais").textContent = data.country;
        document.getElementById("provedor").textContent = data.connection.isp;
      } catch {
        try {
          const res2 = await fetch("https://api.ipify.org?format=json");
          const data2 = await res2.json();

          ipAtual = data2.ip;
          document.getElementById("ip").textContent = data2.ip;
        } catch {
          document.getElementById("ip").textContent = "Erro ao carregar";
        }
      }

      document.getElementById("navegador").textContent = navigator.userAgent;
    }

    function copiarIP() {
      if (!ipAtual) return alert("IP não carregado");
      navigator.clipboard.writeText(ipAtual);
      alert("IP copiado!");
    }

    carregar();
  </script>
</body>
</html>
