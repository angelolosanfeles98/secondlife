<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu IP</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 35px;
      border-radius: 20px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    .ip {
      font-size: 34px;
      font-weight: bold;
      margin: 25px 0;
      color: #38bdf8;
      word-break: break-all;
    }

    .info {
      text-align: left;
      margin-top: 20px;
      line-height: 1.8;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 14px;
    }

    button {
      margin-top: 20px;
      padding: 12px 22px;
      border: none;
      border-radius: 999px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Seu endereço IP</h1>
    <p>Veja suas informações públicas de conexão</p>

    <div class="ip" id="ip">Carregando...</div>

    <div class="info">
      <div><strong>Cidade:</strong> <span id="city">-</span></div>
      <div><strong>Região:</strong> <span id="region">-</span></div>
      <div><strong>País:</strong> <span id="country">-</span></div>
      <div><strong>Provedor:</strong> <span id="org">-</span></div>
      <div><strong>Navegador:</strong> <span id="browser">-</span></div>
    </div>

    <button onclick="copiarIP()">Copiar IP</button>
  </div>

  <script>
    let ipAtual = "";

    async function carregarIP() {
      try {
        const resposta = await fetch("https://ipapi.co/json/");
        const dados = await resposta.json();

        ipAtual = dados.ip;

        document.getElementById("ip").textContent = dados.ip || "Não encontrado";
        document.getElementById("city").textContent = dados.city || "Não informado";
        document.getElementById("region").textContent = dados.region || "Não informado";
        document.getElementById("country").textContent = dados.country_name || "Não informado";
        document.getElementById("org").textContent = dados.org || "Não informado";
        document.getElementById("browser").textContent = navigator.userAgent;
      } catch (erro) {
        document.getElementById("ip").textContent = "Erro ao carregar IP";
      }
    }

    function copiarIP() {
      navigator.clipboard.writeText(ipAtual);
      alert("IP copiado!");
    }

    carregarIP();
  </script>
</body>
</html>
